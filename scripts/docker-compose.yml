# docker-compose.yml
version: '3.8'

services:
  bridge-inspection:
    build: .
    ports:
      - "5000:5000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_RUN_PORT=5000
    volumes:
      - ./dynamic:/app/dynamic
      - ./templates:/app/templates
      - ./static:/app/static
    restart: unless-stopped